version: '3.8'

services:
  db:
    image: postgres:18
    volumes:
      - postgres_data:/var/lib/postgresql/
    env_file:
      - .env
    ports:
      - "5432:5432"

  be:
    build: .
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

volumes:
  postgres_data: